<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materials PO Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- PASSWORD GATE -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-box">
      <h2>Materials PO Generator</h2>
      <input type="password" id="authPassword" placeholder="Password" onkeydown="if(event.key==='Enter')checkAuth()">
      <button onclick="checkAuth()">Login</button>
      <p class="auth-error" id="authError"></p>
    </div>
  </div>

  <div class="app-container" id="appContainer" style="display:none;">
    <!-- FORM PANEL -->
    <div class="form-panel" id="formPanel">
      <h1>Materials PO Generator</h1>
      <div style="margin-bottom: 20px;">
        <a href="../index.html" style="color: #3498db; text-decoration: none; font-weight: bold; font-size: 0.9rem;">&larr; Back to Tools Hub</a>
      </div>

      <details>
        <summary>FROM Details (ASPA AI LABS) — Fixed</summary>
        <div class="form-grid">
          <label>Company Name <input type="text" id="sellerName" value="ASPA AI LABS" readonly></label>
          <label>Address <textarea id="sellerAddress" rows="2" readonly>5, PLOT NO 27, SHAH COLONY, TALEGAON DABHADE, PUNE 410507</textarea></label>
          <label>Phone <input type="text" id="sellerPhone" value="8308810784" readonly></label>
          <label>Email <input type="email" id="sellerEmail" value="aspaailabs@gmail.com" readonly></label>
          <label>Website <input type="text" id="sellerWebsite" value="aspaailabs.com" readonly></label>
          <label>GSTIN <input type="text" id="sellerGstin" value="27BGYPS3448H1ZK" readonly></label>
          <label>MSME No. <input type="text" id="sellerMsme" value="UDYAM-MH-26-1089666" readonly></label>
        </div>
      </details>

      <details open>
        <summary>TO Details</summary>
        <div class="form-grid">
          <label>Person Name / Company <input type="text" id="buyerName" value=""></label>
          <label>Address <textarea id="buyerAddress" rows="2"></textarea></label>
          <label>Phone Number <input type="text" id="buyerPhone" value=""></label>
          <label>Email(s) <input type="text" id="buyerEmail" value=""></label>
        </div>
      </details>

      <details open>
        <summary>Purchase Order Details</summary>
        <div class="form-grid">
          <label>P.O. No. <input type="text" id="poNo" value=""></label>
          <label>Date <input type="date" id="poDate"></label>
          <label>Vendor Code <input type="text" id="vendorCode"></label>
          <label>Kind Attn. <input type="text" id="kindAttn"></label>
          <label>Ref. No. <input type="text" id="refNo"></label>
          <label>Pay. Terms <input type="text" id="payTerms"></label>
          <label>Transport <input type="text" id="transport"></label>
        </div>
      </details>

      <details open>
        <summary>Line Items</summary>
        <div class="line-items-container">
          <table class="line-items-table" id="lineItemsTable">
            <thead>
              <tr>
                <th>Description</th>
                <th>HSN/SAC</th>
                <th>Qty</th>
                <th>Unit</th>
                <th>Rate</th>
                <th>GST%</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="lineItemsBody">
            </tbody>
          </table>
          <button type="button" class="btn btn-add" onclick="addLineItem()">+ Add Item</button>
        </div>
      </details>

      <div class="form-actions">
        <button type="button" class="btn btn-preview" onclick="updatePreview()">Refresh Preview</button>
        <button type="button" class="btn btn-print" onclick="printInvoice()">Print / Save PDF</button>
      </div>
    </div>

    <!-- RESIZE HANDLE -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- INVOICE PREVIEW -->
    <div class="preview-panel" id="previewPanel">
      <div class="invoice-wrapper" id="invoicePreview">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- PRINT-ONLY INVOICE (hidden on screen, shown on print) -->
  <div class="print-only" id="printArea"></div>

  <script src="app.js"></script>
</body>
</html>
