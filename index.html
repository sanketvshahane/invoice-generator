<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Tools Hub</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    .header h1 {
      color: #2c3e50;
      margin: 0 0 10px 0;
      font-size: 2.5rem;
    }
    .header p {
      color: #666;
      font-size: 1.1rem;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #fff;
      padding: 40px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      text-align: center;
      text-decoration: none;
      color: #2c3e50;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      border-color: #3498db;
    }
    .card-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
    }
    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .card-desc {
      font-size: 1rem;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Business Tools Hub</h1>
    <p>Select a tool below to get started</p>
  </div>
  
  <div class="grid">
    <!-- Explicitly linking to index.html so it works even if opened directly from the file system -->
    <a href="invoice/index.html" class="card">
      <span class="card-icon">🧾</span>
      <div class="card-title">Invoice Generator</div>
      <div class="card-desc">Create, calculate taxes, and print GST Invoices</div>
    </a>
    
    <a href="challan/index.html" class="card">
      <span class="card-icon">🚚</span>
      <div class="card-title">Delivery Challan</div>
      <div class="card-desc">Generate Delivery Challans for shipping goods</div>
    </a>
  </div>
</body>
</html>
