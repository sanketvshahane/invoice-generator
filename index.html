<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Invoice Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- PASSWORD GATE -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-box">
      <h2>GST Invoice Generator</h2>
      <p>Enter password to continue</p>
      <input type="password" id="authPassword" placeholder="Password" onkeydown="if(event.key==='Enter')checkAuth()">
      <button onclick="checkAuth()">Login</button>
      <p class="auth-error" id="authError"></p>
    </div>
  </div>

  <div class="app-container" id="appContainer" style="display:none;">
    <!-- FORM PANEL -->
    <div class="form-panel" id="formPanel">
      <h1>GST Invoice Generator</h1>

      <details>
        <summary>Company Details (Seller) — Fixed</summary>
        <div class="form-grid">
          <label>Company Name <input type="text" id="sellerName" value="ASPA AI LABS" readonly></label>
          <label>Address <textarea id="sellerAddress" rows="2" readonly>5, PLOT NO 27, SHAH COLONY, TALEGAON DABHADE, PUNE 410507</textarea></label>
          <label>Phone <input type="text" id="sellerPhone" value="8308810784" readonly></label>
          <label>Email <input type="email" id="sellerEmail" value="aspaailabs@gmail.com" readonly></label>
          <label>Website <input type="text" id="sellerWebsite" value="aspaailabs.com" readonly></label>
          <label>GSTIN <input type="text" id="sellerGstin" value="27BGYPS3448H1ZK" readonly></label>
          <label>PAN <input type="text" id="sellerPan" value="BGYPS3448H" readonly></label>
          <label>State <input type="text" id="sellerState" value="Maharashtra" readonly></label>
          <label>State Code <input type="text" id="sellerStateCode" value="27" readonly></label>
          <label>MSME No. <input type="text" id="sellerMsme" value="" readonly></label>
        </div>
      </details>

      <details open>
        <summary>E-Invoice / IRN Details</summary>
        <div class="form-grid">
          <label>Ack. No. <input type="text" id="ackNo"></label>
          <label>Ack. Date <input type="text" id="ackDate"></label>
          <label>IRN No. <input type="text" id="irnNo" style="font-size:0.65rem;"></label>
          <label>Upload QR Code <input type="file" id="qrUpload" accept="image/*" onchange="handleQrUpload(event)"></label>
        </div>
      </details>

      <details open>
        <summary>Invoice Details</summary>
        <div class="form-grid">
          <label>Invoice No. <input type="text" id="invoiceNo" value=""></label>
          <label>Invoice Date <input type="date" id="invoiceDate"></label>
          <label>P.O. No. <input type="text" id="poNo"></label>
          <label>P.O. Date <input type="date" id="poDate"></label>
          <label>Challan No. <input type="text" id="challanNo"></label>
          <label>Pay Terms <input type="text" id="payTerms" value="0 Days"></label>
          <label>Due Date <input type="date" id="dueDate"></label>
          <label>Delivery <input type="text" id="delivery"></label>
          <label>Kind Attn <input type="text" id="kindAttn"></label>
        </div>
      </details>

      <details open>
        <summary>Buyer & Consignee</summary>
        <div class="form-grid">
          <label>Company Name <input type="text" id="buyerName" value=""></label>
          <label>Address <textarea id="buyerAddress" rows="2"></textarea></label>
          <label>GSTIN <input type="text" id="buyerGstin" value=""></label>
          <label>PAN <input type="text" id="buyerPan" value=""></label>
          <label>State <input type="text" id="buyerState" value="Maharashtra"></label>
          <label>State Code <input type="text" id="buyerStateCode" value="27"></label>
          <label>Reg. Type <input type="text" id="buyerRegType" value="Registered"></label>
        </div>
      </details>

      <details open>
        <summary>Line Items</summary>
        <div class="line-items-container">
          <table class="line-items-table" id="lineItemsTable">
            <thead>
              <tr>
                <th>P.S.No</th>
                <th>Description</th>
                <th>HSN/SAC</th>
                <th>Tax%</th>
                <th>Qty</th>
                <th>Unit</th>
                <th>Rate</th>
                <th>Dis%</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="lineItemsBody">
            </tbody>
          </table>
          <button type="button" class="btn btn-add" onclick="addLineItem()">+ Add Item</button>
        </div>
      </details>

      <details open>
        <summary>Tax Configuration</summary>
        <div class="form-grid">
          <label>GST Type
            <select id="gstType" onchange="updatePreview()">
              <option value="intra">Intra-State (CGST + SGST)</option>
              <option value="inter">Inter-State (IGST)</option>
            </select>
          </label>
        </div>
      </details>

      <details>
        <summary>Bank Details — Fixed</summary>
        <div class="form-grid">
          <label>Bank Name <input type="text" id="bankName" value="PUNJAB NATIONAL BANK" readonly></label>
          <label>Account Name <input type="text" id="bankAccName" value="Aspa AI Labs" readonly></label>
          <label>Branch <input type="text" id="bankBranch" value="Talegaon Dabhade" readonly></label>
          <label>A/c No. <input type="text" id="bankAccNo" value="6515002100006969" readonly></label>
          <label>IFSC Code <input type="text" id="bankIfsc" value="PUNB0651500" readonly></label>
        </div>
      </details>

      <div class="form-actions">
        <button type="button" class="btn btn-preview" onclick="updatePreview()">Refresh Preview</button>
        <button type="button" class="btn btn-print" onclick="printInvoice()">Print / Save PDF</button>
      </div>
    </div>

    <!-- RESIZE HANDLE -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- INVOICE PREVIEW -->
    <div class="preview-panel" id="previewPanel">
      <div class="invoice-wrapper" id="invoicePreview">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- PRINT-ONLY INVOICE (hidden on screen, shown on print) -->
  <div class="print-only" id="printArea"></div>

  <script src="app.js"></script>
</body>
</html>
